# Listen on 8080 — Fly forwards traffic to this port inside the VM.
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    port_in_redirect off;

    # Astro static: serve files and directory indexes directly — no 301 redirects
    # Using $uri/index.html avoids nginx's automatic trailing-slash redirect
    # which would otherwise embed the internal :8080 port in the Location header.
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|webp|svg)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml image/png image/jpeg;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
