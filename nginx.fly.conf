# Listen on 8080 — Fly forwards traffic to this port inside the VM.
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro static: real files first, then friendly fallbacks
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
